name: api-key-auth
version: v1.1.0
description: |
  Secures APIs by validating API keys in incoming requests. API keys are
  provided through a configured HTTP header.

parameters:
  type: object
  additionalProperties: false
  properties:
    key:
      type: string
      x-wso2-policy-advanced-param: false
      description: |
        Specifies the header name that carries the API key.
        Header lookup is case-insensitive.
      default: API-Key
      validation:
        minLength: 1
        maxLength: 128

    in:
      type: string
      x-wso2-policy-advanced-param: false
      description: |
        Specifies where to read the API key. Currently only "header" is
        supported.
      default: header
      enum:
        - "header"

    value-prefix:
      type: string
      x-wso2-policy-advanced-param: true
      description: |
        Optional prefix that should be stripped from the API key value before validation.
        Case-insensitive matching and removal.
      validation:
        minLength: 1
        maxLength: 128

  required:
    - key
    - in

systemParameters:
  type: object
  properties:
    issuer:
      type: string
      description: |
        Identifier of the portal that associated with this gateway.
        Resolved from config.toml [api_key] issuer at startup.
        When resolved to a non-empty string, the policy rejects any API key
        whose issuer field is non-null and does not match this value.
        When empty or absent, the issuer check is skipped entirely.
      default: ""
      "wso2/defaultValue": "${config.api_key.issuer}"

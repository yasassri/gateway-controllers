name: mcp-authz
version: v1.0.1
description: |
  Authorize MCP tools, resources, prompts, and methods using claim/scope rules after `mcp-auth`; evaluate rules by specificity, require all matching rules to pass, and allow access when no rule matches.

parameters:
  type: object
  additionalProperties: false
  properties:
    tools:
      type: array
      x-wso2-policy-advanced-param: false
      description: Define authorization rules for MCP tools by setting the tool name plus required claims and/or scopes; exact-name rules are evaluated before wildcards, and all matching rules must pass.
      items:
        type: object
        additionalProperties: false
        required:
          - name
        anyOf:
          - required:
              - requiredClaims
            properties:
              requiredClaims:
                minProperties: 1
          - required:
              - requiredScopes
            properties:
              requiredScopes:
                minItems: 1
        properties:
          name:
            type: string
            x-wso2-policy-advanced-param: false
            description: Specify the tool name to authorize, or `*` to match all tools.
            default: "*"
            minLength: 1
            maxLength: 256

          requiredClaims:
            type: object
            x-wso2-policy-advanced-param: false
            description: "Require JWT claims as `claimName: expectedValue`; all listed claims must exist and match exactly, and if scopes are also set, both claims and scopes must pass."
            default: {}
            additionalProperties:
              type: string

          requiredScopes:
            type: array
            x-wso2-policy-advanced-param: false
            description: Require OAuth scopes for this rule; at least one of the listed scopes must exist in token `scope` or `scp`, and if claims are also set, both scopes and claims must pass.
            default: []
            items:
              type: string
              minLength: 1
              maxLength: 256

    resources:
      type: array
      x-wso2-policy-advanced-param: false
      description: Define authorization rules for MCP resources by setting the resource URI plus required claims and/or scopes; exact-name rules are evaluated before wildcards, and all matching rules must pass.
      items:
        type: object
        additionalProperties: false
        required:
          - name
        anyOf:
          - required:
              - requiredClaims
            properties:
              requiredClaims:
                minProperties: 1
          - required:
              - requiredScopes
            properties:
              requiredScopes:
                minItems: 1
        properties:
          name:
            type: string
            x-wso2-policy-advanced-param: false
            description: Specify the resource URI to authorize, or `*` to match all resources.
            default: "*"
            minLength: 1
            maxLength: 256

          requiredClaims:
            type: object
            x-wso2-policy-advanced-param: false
            description: "Require JWT claims as `claimName: expectedValue`; all listed claims must exist and match exactly, and if scopes are also set, both claims and scopes must pass."
            default: {}
            additionalProperties:
              type: string

          requiredScopes:
            type: array
            x-wso2-policy-advanced-param: false
            description: Require OAuth scopes for this rule; at least one of the listed scopes must exist in token `scope` or `scp`, and if claims are also set, both scopes and claims must pass.
            default: []
            items:
              type: string
              minLength: 1
              maxLength: 256

    prompts:
      type: array
      x-wso2-policy-advanced-param: false
      description: Define authorization rules for MCP prompts by setting the prompt name plus required claims and/or scopes; exact-name rules are evaluated before wildcards, and all matching rules must pass.
      items:
        type: object
        additionalProperties: false
        required:
          - name
        anyOf:
          - required:
              - requiredClaims
            properties:
              requiredClaims:
                minProperties: 1
          - required:
              - requiredScopes
            properties:
              requiredScopes:
                minItems: 1
        properties:
          name:
            type: string
            x-wso2-policy-advanced-param: false
            description: Specify the prompt name to authorize, or `*` to match all prompts.
            default: "*"
            minLength: 1
            maxLength: 256

          requiredClaims:
            type: object
            x-wso2-policy-advanced-param: false
            description: "Require JWT claims as `claimName: expectedValue`; all listed claims must exist and match exactly, and if scopes are also set, both claims and scopes must pass."
            default: {}
            additionalProperties:
              type: string

          requiredScopes:
            type: array
            x-wso2-policy-advanced-param: false
            description: Require OAuth scopes for this rule; at least one of the listed scopes must exist in token `scope` or `scp`, and if claims are also set, both scopes and claims must pass.
            default: []
            items:
              type: string
              minLength: 1
              maxLength: 256

    methods:
      type: array
      x-wso2-policy-advanced-param: false
      description: Define authorization rules for MCP methods by setting the method name plus required claims and/or scopes; exact-name rules are evaluated before wildcards, and all matching rules must pass.
      items:
        type: object
        additionalProperties: false
        required:
          - name
        anyOf:
          - required:
              - requiredClaims
            properties:
              requiredClaims:
                minProperties: 1
          - required:
              - requiredScopes
            properties:
              requiredScopes:
                minItems: 1
        properties:
          name:
            type: string
            x-wso2-policy-advanced-param: false
            description: Specify the method name to authorize (e.g., `tools/call`), or `*` to match all methods.
            default: "*"
            minLength: 1
            maxLength: 256

          requiredClaims:
            type: object
            x-wso2-policy-advanced-param: false
            description: "Require JWT claims as `claimName: expectedValue`; all listed claims must exist and match exactly, and if scopes are also set, both claims and scopes must pass."
            default: {}
            additionalProperties:
              type: string

          requiredScopes:
            type: array
            x-wso2-policy-advanced-param: false
            description: Require OAuth scopes for this rule; at least one of the listed scopes must exist in token `scope` or `scp`, and if claims are also set, both scopes and claims must pass.
            default: []
            items:
              type: string
              minLength: 1
              maxLength: 256

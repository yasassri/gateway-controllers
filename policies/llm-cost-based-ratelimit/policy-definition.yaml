name: llm-cost-based-ratelimit
version: v1.1.0
description: |
  A specialized rate limiting policy for LLMs that limits usage based on monetary budgets.
  The policy reads costs from SharedContext.Metadata under "x-llm-cost" (set by the llm-cost
  system policy) and enforces per-consumer spending limits (e.g., $10 per hour, $100 per day).
  It delegates the actual rate limiting to the advanced-ratelimit engine.

parameters:
  type: object
  additionalProperties: false
  required: ["budgetLimits"]
  properties:
    budgetLimits:
      type: array
      x-wso2-policy-advanced-param: false
      description: |
        Budget limits define the maximum amount of money the user is willing to spend
        within specific time windows. Multiple limits can be configured for different
        time granularities (e.g., per hour, per day, per month).
      minItems: 1
      maxItems: 10
      items:
        type: object
        x-wso2-policy-advanced-param: false
        additionalProperties: false
        required: ["amount", "duration"]
        properties:
          amount:
            type: number
            x-wso2-policy-advanced-param: false
            description: |
              Maximum monetary budget allowed in the specified time window.
              This is the spending cap that the user defines (e.g., 10 for $10).
            minimum: 0.000001
            maximum: 1000000
          duration:
            type: string
            x-wso2-policy-advanced-param: false
            description: |
              Time window for the budget limit (Go duration string format).
              Examples: "1h" (1 hour), "24h" (1 day), "168h" (1 week), "720h" (30 days)
            pattern: "^(([0-9]+(\\.[0-9]*)?|\\.[0-9]+)(ns|us|µs|ms|s|m|h))+$"

    consumerBased:
      type: boolean
      x-wso2-policy-advanced-param: false
      description: |
        When true, rate limits are applied per consumer (GenAI application) identified
        by the x-wso2-application-id metadata key set by the api-key-auth policy.
        Each application gets its own independent cost counter.
        When false (default), a single shared limit applies across all consumers.
      default: false

systemParameters:
  type: object
  additionalProperties: false
  properties:
    costScaleFactor:
      type: integer
      description: |
        Scale factor for converting dollar amounts to internal units for precision.
        The underlying rate limiter uses int64 counters, so costs less than 1 would be
        truncated to 0 without scaling. This factor scales both the budget limits and
        the cost multipliers to preserve precision.

        Example values:
        - 1000000000 (default): Nano-dollars. $1.00 = 1,000,000,000 units. Precision to 9 decimal places.
          Recommended for high-volume LLM APIs where per-token costs are very small.
        - 1000000: Micro-dollars. $1.00 = 1,000,000 units. Precision to 6 decimal places.
        - 1000: Milli-dollars. $1.00 = 1,000 units. Precision to 3 decimal places.
        - 100: Cents. $1.00 = 100 units. Precision to 2 decimal places.

        The response headers will include both the raw scaled values and human-readable
        dollar amounts (x-ratelimit-cost-limit-dollars, x-ratelimit-cost-remaining-dollars).
      minimum: 1
      default: 1000000000
      "wso2/defaultValue": "${config.policy_configurations.llm_cost_ratelimit_v1.cost_scale_factor}"

    # Rate limiting algorithm and backend - inherited from advanced-ratelimit
    algorithm:
      type: string
      description: |
        Rate limiting algorithm to use:
        - gcra: Generic Cell Rate Algorithm (default). Provides smooth rate limiting
          with burst support and token bucket semantics.
        - fixed-window: Simple fixed time window counter. Lower computational overhead
          but can allow up to 2x burst at window boundaries.
      enum: ["gcra", "fixed-window"]
      default: "gcra"
      "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.algorithm}"

    backend:
      type: string
      description: |
        Rate limit storage backend. 'memory' for in-memory storage (single-instance),
        'redis' for exact distributed rate limiting (one Redis call per request), or
        'redis-local-async' for distributed rate limiting with a local-first hot path
        that reconciles with Redis asynchronously (lower latency and Redis load, with
        bounded overshoot).
      enum: ["memory", "redis", "redis-local-async"]
      default: "memory"
      "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.backend}"

    redis:
      type: object
      description: Redis configuration (used when backend=redis or backend=redis-local-async)
      additionalProperties: false
      properties:
        host:
          type: string
          default: "localhost"
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.redis.host}"
        port:
          type: integer
          default: 6379
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.redis.port}"
        password:
          type: string
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.redis.password}"
        username:
          type: string
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.redis.username}"
        db:
          type: integer
          default: 0
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.redis.db}"
        keyPrefix:
          type: string
          default: "ratelimit:v1:"
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.redis.key_prefix}"
        failureMode:
          type: string
          enum: ["open", "closed"]
          default: "open"
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.redis.failure_mode}"
        connectionTimeout:
          type: string
          default: "5s"
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.redis.connection_timeout}"
        readTimeout:
          type: string
          default: "3s"
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.redis.read_timeout}"
        writeTimeout:
          type: string
          default: "3s"
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.redis.write_timeout}"
        poolSize:
          type: integer
          description: |
            Redis connection pool size for the shared client. 0 = go-redis default
            (10 × GOMAXPROCS). One pool is shared per distinct Redis endpoint config.
          minimum: 0
          default: 0
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.redis.pool_size}"

    memory:
      type: object
      description: In-memory storage configuration (only used when backend=memory)
      additionalProperties: false
      properties:
        maxEntries:
          type: integer
          default: 10000
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.memory.max_entries}"
        cleanupInterval:
          type: string
          default: "5m"
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.memory.cleanup_interval}"

    local:
      type: object
      description: Configures the local-first hot path when backend is redis-local-async.
      additionalProperties: false
      properties:
        syncInterval:
          type: string
          description: |
            Specifies how often locally counted requests are flushed to Redis and the
            authoritative count is read back. Lower values tighten accuracy (less
            overshoot) at the cost of more Redis operations. Supports units ns, us, µs,
            ms, s, m, h, including composite and fractional values (for example "500ms",
            "1.5s", "1m30s").
          default: "50ms"
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.local.sync_interval}"
        flushWorkers:
          type: integer
          description: |
            Number of background flush workers shared by all redis-local-async limiters
            in the process. 0 = auto (GOMAXPROCS/2, capped at 8). Only the first
            registrant's value takes effect; a restart is required to change it.
          minimum: 0
          default: 0
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.local.flush_workers}"
        maxPipelineCommands:
          type: integer
          description: |
            Maximum INCRBYs issued in a single Redis pipeline per flush; excess dirty keys
            spill to the next flush tick.
          minimum: 0
          default: 5000
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.local.max_pipeline_commands}"
        maxLocalEntries:
          type: integer
          description: |
            Maximum local key-state entries per limiter before eviction (carrying any
            unflushed delta to Redis). Bounds memory under high/adversarial key
            cardinality.
          minimum: 0
          default: 100000
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.local.max_local_entries}"
name: mcp-auth
version: v1.1.0
description: |
  Secure Model Context Protocol traffic by validating bearer access tokens for MCP resources using the underlying JWT authentication runtime.

parameters:
  type: object
  additionalProperties: false
  properties:
    tools:
      type: object
      x-wso2-policy-advanced-param: false
      description: Security configuration for MCP tools.
      additionalProperties: false
      properties:
        enabled:
          type: boolean
          description: Whether security is enabled for tools.
          default: true
        exceptions:
          type: array
          x-wso2-policy-advanced-param: true
          description: List of tool names to exclude from security checks.
          default: []
          items:
            type: string

    resources:
      type: object
      x-wso2-policy-advanced-param: false
      description: Security configuration for MCP resources.
      additionalProperties: false
      properties:
        enabled:
          type: boolean
          description: Whether security is enabled for resources.
          default: true
        exceptions:
          type: array
          x-wso2-policy-advanced-param: true
          description: List of resource URIs to exclude from security checks.
          default: []
          items:
            type: string

    prompts:
      type: object
      x-wso2-policy-advanced-param: false
      description: Security configuration for MCP prompts.
      additionalProperties: false
      properties:
        enabled:
          type: boolean
          description: Whether security is enabled for prompts.
          default: true
        exceptions:
          type: array
          x-wso2-policy-advanced-param: true
          description: List of prompt names to exclude from security checks.
          default: []
          items:
            type: string

    methods:
      type: object
      x-wso2-policy-advanced-param: false
      description: Security configuration for MCP (JSON-RPC) methods.
      additionalProperties: false
      properties:
        enabled:
          type: boolean
          description: Whether security is enabled for methods.
          default: true
        exceptions:
          type: array
          x-wso2-policy-advanced-param: true
          description: List of method names to exclude from security checks.
          default: []
          items:
            type: string

    issuers:
      type: array
      x-wso2-policy-advanced-param: true
      description: Specify issuer names from `system.keyManagers` to publish in protected resource metadata and use for token validation; if empty, runtime uses all configured key managers.
      default: []
      items:
        type: string

    requiredScopes:
      type: array
      x-wso2-policy-advanced-param: true
      description: >-
        List of scopes that should be included in the token generated through MCP auth flow.
        This will be used only to inform the MCP client about the scopes to be included in the token through the protected resource metadata endpoint, 
        and the runtime will not enforce scope checks based on this list. 
        To enforce scopes for specific tools, resources, prompts, or methods, use the `MCP Authorization` policy.
      default: []
      items:
        type: string

    claimMappings:
      type: object
      x-wso2-policy-advanced-param: true
      description: Map claimName -> downstream header or context key to expose for downstream services.
      default: {}
      additionalProperties:
        type: string

systemParameters:          
  type: object
  additionalProperties: false
  properties:
    keyManagers:
      type: array
      description: >-
        List of key manager definitions. Each entry must include a unique `name` 
        and either `jwks` (for remote JWKS or local certificates) configuration.
      items:
        type: object
        additionalProperties: false
        required: ["name", "issuer"]
        properties:
          name:
            type: string
            description: Unique name for this key manager/provider (used in `user.issuers`).
          issuer:
            type: string
            description: Issuer (iss) value associated with keys from this provider.
          jwks:
            type: object
            description: JWKS configuration supporting both remote endpoints and local certificates. Either 'remote' or 'local' must be specified, but not both.
            additionalProperties: false
            oneOf:
              - required: ["remote"]
                not:
                  required: ["local"]
              - required: ["local"]
                not:
                  required: ["remote"]
            properties:
              remote:
                type: object
                description: Remote JWKS endpoint configuration. The 'uri' field is required.
                additionalProperties: false
                required: ["uri"]
                properties:
                  uri:
                    type: string
                    format: uri
                    description: JWKS endpoint URL (e.g., https://idp.example/.well-known/jwks.json).
                  certificatePath:
                    type: string
                    description: Optional path to CA certificate file for validating self-signed JWKS endpoints (e.g., /etc/certs/ca.pem).
                  skipTlsVerify:
                    type: boolean
                    default: false
                    description: If true, skip TLS certificate verification for the JWKS endpoint. Use with caution, only for testing or trusted internal endpoints.
              local:
                type: object
                description: Local certificate configuration for signature verification. Either 'inline' or 'certificatePath' must be provided, but not both.
                additionalProperties: false
                oneOf:
                  - required: ["inline"]
                    not:
                      required: ["certificatePath"]
                  - required: ["certificatePath"]
                    not:
                      required: ["inline"]
                properties:
                  inline:
                    type: string
                    description: Inline PEM-encoded certificate or public key for signature verification.
                  certificatePath:
                    type: string
                    description: Path to certificate or public key file (e.g., /etc/certs/public.pem).
      "wso2/defaultValue": "${config.policy_configurations.jwtauth_v1.keymanagers}"

    jwksCacheTtl:
      type: string
      description: Duration string for JWKS caching (e.g., "5m"). If omitted a default is used.
      "wso2/defaultValue": "${config.policy_configurations.jwtauth_v1.jwkscachettl}"

    jwksFetchTimeout:
      type: string
      description: Timeout for HTTP fetch of JWKS, e.g., "5s".
      "wso2/defaultValue": "${config.policy_configurations.jwtauth_v1.jwksfetchtimeout}"

    jwksFetchRetryCount:
      type: integer
      description: Number of retries for JWKS fetch on transient failures.
      "wso2/defaultValue": "${config.policy_configurations.jwtauth_v1.jwksfetchretrycount}"

    jwksFetchRetryInterval:
      type: string
      description: Interval between JWKS fetch retries, e.g., "2s".
      "wso2/defaultValue": "${config.policy_configurations.jwtauth_v1.jwksfetchretryinterval}"

    leeway:
      type: string
      description: Clock skew allowance for exp/nbf checks, e.g., "30s".
      "wso2/defaultValue": "${config.policy_configurations.jwtauth_v1.leeway}"

    authHeaderScheme:
      type: string
      description: Expected scheme prefix in the authorization header (e.g., "Bearer"). If set, runtime enforces the scheme; if omitted, runtime may accept raw header values or strip known schemes.
      default: Bearer
      "wso2/defaultValue": "${config.policy_configurations.jwtauth_v1.authheaderscheme}"

    headerName:
      type: string
      description: Header name to extract token from (default "Authorization").
      default: Authorization
      "wso2/defaultValue": "${config.policy_configurations.jwtauth_v1.headername}"

    onFailureStatusCode:
      type: integer
      description: HTTP status code to return on authentication failure (401 for Unauthorized, 403 for Forbidden).
      default: 401
      enum:
        - 401
        - 403
      "wso2/defaultValue": "${config.policy_configurations.jwtauth_v1.onfailurestatuscode}"

    errorMessageFormat:
      type: string
      description: Format of error response on JWT validation failure. Supported values are "json" (structured error), "plain" (plain text), or "minimal" (minimal response).
      default: json
      enum:
        - json
        - plain
        - minimal
      "wso2/defaultValue": "${config.policy_configurations.jwtauth_v1.errormessageformat}"
    
    errorMessage:
      type: string
      description: Custom error message to include in the response body on authentication failure.
      "wso2/defaultValue": "${config.policy_configurations.jwtauth_v1.errormessage}"

    validateIssuer:
      type: boolean
      description: Whether to validate the token's issuer claim against configured key managers.
      "wso2/defaultValue": "${config.policy_configurations.jwtauth_v1.validateissuer}"
    
    gatewayHost:
      type: string
      description: The host of the gateway to be included in the protected metadata URL and response.
      example: mcp1.api-platform.com
      default: localhost
      "wso2/defaultValue": "${config.policy_configurations.mcpauth_v1.gatewayhost}"


  required: ["keyManagers"]

name: basic-ratelimit
version: v1.1.0
description: |
  Limits request rates by restricting the number of requests allowed within one
  or more defined time windows.

parameters:
  type: object
  additionalProperties: false
  required: ["limits"]
  properties:
    limits:
      type: array
      description: |
        Specifies one or more rate limits. All limits are evaluated, and the
        most restrictive result is enforced.
      minItems: 1
      maxItems: 10
      items:
        type: object
        additionalProperties: false
        required: ["requests", "duration"]
        properties:
          requests:
            type: integer
            description: Specifies the maximum number of requests allowed during
              the configured duration.
            minimum: 1
            maximum: 1000000000
          duration:
            type: string
            description: |
              Specifies the time window for the limit. Supports integer values
              with units: ns, us, µs, ms, s, m, h (for example "500ms", "1s",
              "1m", "1h", "24h").
            pattern: "^[0-9]+(ns|us|µs|ms|s|m|h)$"

systemParameters:
  type: object
  additionalProperties: false
  properties:
    algorithm:
      type: string
      description: |
        Rate limiting algorithm to use:
        - gcra: Generic Cell Rate Algorithm. Provides smooth rate limiting
          with burst support and token bucket semantics. Better for consistent traffic
          shaping and burst handling.
        - fixed-window: Simple fixed time window counter (default). Divides time into
          fixed intervals and counts requests per window. Lower computational overhead,
          but can allow up to 2x burst at window boundaries.
      enum: ["gcra", "fixed-window"]
      default: "fixed-window"
      "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.algorithm}"

    backend:
      type: string
      description: |
        Rate limit storage backend. 'memory' for in-memory storage (single-instance),
        'redis' for exact distributed rate limiting (one Redis call per request), or
        'redis-local-async' for distributed rate limiting with a local-first hot path
        that reconciles with Redis asynchronously (lower latency and Redis load, with
        bounded overshoot).
      enum: ["memory", "redis", "redis-local-async"]
      default: "memory"
      "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.backend}"

    redis:
      type: object
      description: Redis configuration (used when backend=redis or backend=redis-local-async)
      additionalProperties: false
      properties:
        host:
          type: string
          description: Redis server hostname or IP address
          default: "localhost"
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.redis.host}"

        port:
          type: integer
          description: Redis server port
          minimum: 1
          maximum: 65535
          default: 6379
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.redis.port}"

        password:
          type: string
          description: Redis authentication password (optional)
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.redis.password}"

        username:
          type: string
          description: Redis ACL username (optional, Redis 6+)
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.redis.username}"

        db:
          type: integer
          description: Redis database number
          minimum: 0
          maximum: 15
          default: 0
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.redis.db}"

        keyPrefix:
          type: string
          description: Prefix for all Redis keys to avoid conflicts
          default: "ratelimit:v1:"
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.redis.key_prefix}"

        failureMode:
          type: string
          description: |
            Behavior when Redis is unavailable. 'open' allows requests through,
            'closed' denies requests. Recommended: 'open' for availability.
          enum: ["open", "closed"]
          default: "open"
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.redis.failure_mode}"

        connectionTimeout:
          type: string
          description: Redis connection timeout as a Go duration string.
            Supports units ns, us, µs, ms, s, m, h, including composite and
            fractional values (for example "500ms", "1.5s", "1m30s").
          default: "5s"
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.redis.connection_timeout}"

        readTimeout:
          type: string
          description: Redis read timeout as a Go duration string. Supports
            units ns, us, µs, ms, s, m, h, including composite and fractional
            values (for example "500ms", "1.5s", "1m30s").
          default: "3s"
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.redis.read_timeout}"

        writeTimeout:
          type: string
          description: Redis write timeout as a Go duration string. Supports
            units ns, us, µs, ms, s, m, h, including composite and fractional
            values (for example "500ms", "1.5s", "1m30s").
          default: "3s"
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.redis.write_timeout}"

        poolSize:
          type: integer
          description: |
            Redis connection pool size for the shared client. 0 = go-redis default
            (10 × GOMAXPROCS). One pool is shared per distinct Redis endpoint config.
          minimum: 0
          default: 0
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.redis.pool_size}"

    memory:
      type: object
      description: In-memory storage configuration (only used when backend=memory)
      additionalProperties: false
      properties:
        maxEntries:
          type: integer
          description: |
            Maximum number of rate limit entries to store in memory.
            Oldest entries are evicted when limit is reached.
          minimum: 100
          maximum: 10000000
          default: 10000
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.memory.max_entries}"

        cleanupInterval:
          type: string
          description: |
            Interval for cleaning up expired entries as a Go duration string.
            Supports units ns, us, µs, ms, s, m, h, including composite and
            fractional values (for example "500ms", "1.5s", "1m30s").
            Use "0" to disable periodic cleanup.
          default: "5m"
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.memory.cleanup_interval}"

    local:
      type: object
      description: Configures the local-first hot path when backend is redis-local-async.
      additionalProperties: false
      properties:
        syncInterval:
          type: string
          description: |
            Specifies how often locally counted requests are flushed to Redis and the
            authoritative count is read back. Lower values tighten accuracy (less
            overshoot) at the cost of more Redis operations. Supports units ns, us, µs,
            ms, s, m, h, including composite and fractional values (for example "500ms",
            "1.5s", "1m30s").
          default: "50ms"
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.local.sync_interval}"

        flushWorkers:
          type: integer
          description: |
            Number of background flush workers shared by all redis-local-async limiters
            in the process. 0 = auto (GOMAXPROCS/2, capped at 8). Only the first
            registrant's value takes effect; a restart is required to change it.
          minimum: 0
          default: 0
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.local.flush_workers}"

        maxPipelineCommands:
          type: integer
          description: |
            Maximum INCRBYs issued in a single Redis pipeline per flush; excess dirty keys
            spill to the next flush tick.
          minimum: 0
          default: 5000
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.local.max_pipeline_commands}"

        maxLocalEntries:
          type: integer
          description: |
            Maximum local key-state entries per limiter before eviction (carrying any
            unflushed delta to Redis). Bounds memory under high/adversarial key
            cardinality.
          minimum: 0
          default: 100000
          "wso2/defaultValue": "${config.policy_configurations.ratelimit_v1.local.max_local_entries}"
